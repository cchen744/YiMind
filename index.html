<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>易心 YiMind · 大衍筮法</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700;900&family=Noto+Serif:wght@400;700&display=swap" rel="stylesheet">
<style>
/* ============================================================================
   YiMind · styled to match CLACC (claccuw.com) palette:
     bg cream/tan, card off-white, deep red (#8B1E1E) accents, serif typography.
   Designed to be iframed into Wix or embedded as an HTML block.
   ============================================================================ */
:root {
  --bg:       #E4CDA7;
  --card:     #F7EEDD;
  --accent:   #8B1E1E;
  --accent-2: #B72424;
  --ink:      #2a1a0f;
  --muted:    #7a6a55;
  --line:     #c9b48a;
  --gold:     #c49a2c;
}
* { box-sizing: border-box; }
html, body {
  margin: 0; padding: 0;
  background: var(--bg);
  color: var(--ink);
  font-family: "Noto Serif TC", "Noto Serif", Georgia, serif;
  line-height: 1.6;
  min-height: 100vh;
}
body { padding: 24px 16px; }
.wrap { max-width: 820px; margin: 0 auto; }

.card {
  background: var(--card);
  border: 1px solid var(--line);
  border-radius: 6px;
  padding: 28px 32px;
  box-shadow: 0 2px 0 rgba(0,0,0,0.03), 0 8px 24px rgba(139,30,30,0.06);
}

/* ---------- Header ---------- */
header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px; }
.title { margin: 0; color: var(--accent); font-weight: 900; font-size: 1.9rem; letter-spacing: 2px; }
.subtitle { margin: 0; color: var(--muted); font-size: 0.95rem; }
.lang-toggle {
  background: transparent; border: 1px solid var(--accent); color: var(--accent);
  padding: 6px 12px; border-radius: 999px; font: inherit; cursor: pointer;
  font-size: 0.85rem;
}
.lang-toggle:hover { background: var(--accent); color: var(--card); }

/* ---------- Screens ---------- */
.screen { display: none; }
.screen.active { display: block; animation: fade 0.35s ease; }
@keyframes fade { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; } }

/* ---------- Intro screen ---------- */
.intro-body p { color: var(--muted); margin: 0 0 14px; }
.question-input {
  width: 100%; padding: 14px 16px; margin: 12px 0 6px;
  border: 1px solid var(--line); border-radius: 4px;
  background: white; font: inherit; color: var(--ink); resize: vertical;
  min-height: 88px;
}
.question-input:focus { outline: 2px solid var(--accent-2); outline-offset: -1px; }
.btn-primary {
  background: var(--accent); color: var(--card); border: 0;
  padding: 12px 26px; border-radius: 4px; font: inherit; font-weight: 700;
  cursor: pointer; letter-spacing: 1px;
}
.btn-primary:hover { background: var(--accent-2); }
.btn-primary:disabled { background: var(--muted); cursor: not-allowed; }
.btn-secondary {
  background: transparent; color: var(--accent); border: 1px solid var(--accent);
  padding: 10px 20px; border-radius: 4px; font: inherit; cursor: pointer;
  margin-right: 8px;
}
.btn-secondary:hover { background: var(--accent); color: var(--card); }

/* ---------- Divining screen ---------- */
.progress-bar {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 8px; margin-bottom: 12px;
  font-size: 0.85rem; color: var(--muted);
}
.progress-bar .cell { background: rgba(139,30,30,0.06); padding: 6px 10px; border-radius: 3px; }
.progress-bar .cell strong { color: var(--accent); font-weight: 700; }

.yao-stack {
  display: flex; flex-direction: column-reverse;
  gap: 6px; margin: 14px 0 18px;
  background: rgba(0,0,0,0.02); padding: 12px; border-radius: 4px;
  min-height: 150px;
}
.yao-row {
  display: flex; align-items: center; gap: 10px; height: 14px;
}
.yao-label { width: 2em; color: var(--muted); font-size: 0.8rem; text-align: right; }
.yao-line { flex: 1; height: 8px; background: transparent; border-radius: 2px; position: relative; }
.yao-line.solid { background: var(--ink); }
.yao-line.broken::before,
.yao-line.broken::after {
  content: ""; position: absolute; top: 0; height: 100%;
  width: calc(50% - 6px); background: var(--ink); border-radius: 2px;
}
.yao-line.broken::before { left: 0; }
.yao-line.broken::after  { right: 0; }
.yao-line.changing::after, .yao-line.changing-solid {
  box-shadow: 0 0 0 1px var(--gold), 0 0 8px var(--gold);
}
.yao-line.changing-solid { background: var(--ink); }
.yao-line.changing-solid.solid { animation: pulseGold 1.8s infinite; }
@keyframes pulseGold { 50% { box-shadow: 0 0 0 1px var(--gold), 0 0 14px var(--gold); } }

canvas#stalks {
  width: 100%; height: 180px; display: block;
  background: linear-gradient(to bottom, rgba(255,255,255,0.4), transparent);
  border: 1px dashed var(--line); border-radius: 4px; cursor: crosshair;
  margin: 8px 0;
  touch-action: none;
}
.stalks-hint { color: var(--muted); font-size: 0.85rem; text-align: center; margin: 4px 0 10px; }

.bian-log {
  background: white; border: 1px solid var(--line); border-radius: 4px;
  padding: 10px 14px; font-size: 0.9rem; margin-top: 10px;
  max-height: 160px; overflow-y: auto;
  font-family: ui-monospace, "SF Mono", Menlo, monospace;
  color: var(--muted);
}
.bian-log .completed { color: var(--ink); }
.bian-log .fresh { color: var(--accent); font-weight: 700; }

/* ---------- Result screen ---------- */
.hex-grid {
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px;
  margin: 18px 0 22px;
}
.hex-card {
  background: white; border: 1px solid var(--line); border-radius: 6px;
  padding: 16px; text-align: center;
}
.hex-card .hex-role { color: var(--accent); font-weight: 700; letter-spacing: 2px; margin-bottom: 6px; }
.hex-card .hex-symbol { font-size: 3.2rem; color: var(--ink); line-height: 1; margin: 4px 0; }
.hex-card .hex-name { font-weight: 700; font-size: 1.05rem; }
.hex-card .hex-name-en { color: var(--muted); font-size: 0.82rem; margin-top: 2px; }
.hex-card .hex-kw { color: var(--muted); font-size: 0.75rem; margin-top: 4px; }

.hex-card.hidden { visibility: hidden; }

.changing-note {
  background: rgba(196,154,44,0.12); border-left: 3px solid var(--gold);
  padding: 10px 14px; margin: 12px 0; border-radius: 3px; font-size: 0.9rem;
}

/* ---------- Interpretation screen ---------- */
.interpretation {
  background: white; border: 1px solid var(--line); border-radius: 6px;
  padding: 20px 24px; margin: 16px 0;
  white-space: pre-wrap; font-size: 1rem; line-height: 1.9;
  min-height: 120px;
}
.interpretation .cursor::after {
  content: "▍"; animation: blink 0.9s infinite; color: var(--accent);
}
@keyframes blink { 50% { opacity: 0; } }

.error {
  background: rgba(183,36,36,0.08); border-left: 3px solid var(--accent-2);
  padding: 10px 14px; border-radius: 3px; color: var(--accent-2); font-size: 0.9rem;
}

/* Mobile */
@media (max-width: 560px) {
  body { padding: 12px 8px; }
  .card { padding: 18px 16px; }
  .title { font-size: 1.5rem; }
  .hex-grid { grid-template-columns: 1fr; }
}

/* footer + modal */
.footer{
  margin-top:24px;padding:14px 10px;text-align:center;
  font-size:12px;color:#6b4a3a;border-top:1px solid #d8c4a5;
}
.footer a{color:var(--accent);text-decoration:none;margin:0 8px}
.footer a:hover{text-decoration:underline}
.modal-bg{
  position:fixed;inset:0;background:rgba(0,0,0,.45);
  display:none;align-items:center;justify-content:center;z-index:50;
}
.modal-bg.open{display:flex}
.modal{
  background:var(--card);max-width:640px;width:92%;
  max-height:82vh;overflow:auto;padding:22px 26px;border-radius:10px;
  box-shadow:0 10px 40px rgba(0,0,0,.25);font-family:"Noto Serif TC",serif;
  position:relative;
}
.modal h3{margin-top:0;color:var(--accent);font-weight:600;padding-right:28px}
.modal h4{color:#5a2828;margin:14px 0 4px}
.modal p,.modal li{line-height:1.7;color:#2b2b2b;font-size:14px}
.modal .close{
  position:absolute;top:10px;right:14px;
  background:none;border:none;font-size:22px;
  cursor:pointer;color:#8b6a4e;line-height:1
}

</style>
</head>
<body>
<div class="wrap">
<div class="card">

<header>
  <div>
    <h1 class="title" data-i18n="title">易 心</h1>
    <p class="subtitle" data-i18n="subtitle">大衍筮法 · IChing Yarrow Stalk Divination</p>
  </div>
  <button class="lang-toggle" id="langBtn">EN / 中</button>
</header>

<!-- ========== Screen: intro ========== -->
<section class="screen active" id="screen-intro">
  <div class="intro-body">
    <p data-i18n="intro.1">《易》曰：「大衍之數五十，其用四十有九。」</p>
    <p data-i18n="intro.2">請先靜心，寫下您心中所欲問之事，再進入起卦。</p>
    <label for="question" data-i18n="question.label">所問之事 · Your question</label>
    <textarea id="question" class="question-input" data-i18n-placeholder="question.placeholder"
      placeholder="例如：這學期該選哪一門課？"></textarea>
  </div>
  <button class="btn-primary" id="startBtn" data-i18n="startBtn">開始起卦 · Begin</button>
</section>

<!-- ========== Screen: divining ========== -->
<section class="screen" id="screen-divining">
  <div class="progress-bar">
    <div class="cell"><span data-i18n="prog.yao">第</span>
      <strong id="progYao">1</strong><span data-i18n="prog.yaoOf">爻（共六爻）</span></div>
    <div class="cell"><span data-i18n="prog.bian">第</span>
      <strong id="progBian">1</strong><span data-i18n="prog.bianOf">變（共三變）</span></div>
  </div>

  <div class="yao-stack" id="yaoStack"><!-- 6 rows, bottom up, filled as drawn --></div>

  <p class="stalks-hint" id="stalksHint" data-i18n="stalks.hint">
    請點擊下方蓍草堆，將其一分為二（點擊位置左側為左堆）
  </p>
  <canvas id="stalks" width="760" height="180"></canvas>

  <div class="bian-log" id="bianLog"></div>
</section>

<!-- ========== Screen: result ========== -->
<section class="screen" id="screen-result">
  <div class="hex-grid" id="hexGrid"><!-- populated dynamically --></div>
  <div id="changingNote"></div>
  <button class="btn-primary" id="interpretBtn" data-i18n="interpretBtn">請 AI 解卦 · Ask AI</button>
  <button class="btn-secondary" id="restartBtn" data-i18n="restartBtn">重新起卦 · Restart</button>
</section>

<!-- ========== Screen: interpretation ========== -->
<section class="screen" id="screen-interp">
  <div class="hex-grid" id="hexGridRecap"><!-- same three hexagrams, smaller --></div>
  <h3 style="color: var(--accent);" data-i18n="interp.title">卦象解讀 · Interpretation</h3>
  <div class="interpretation" id="interpBody"><span class="cursor"></span></div>
  <div id="interpError"></div>
  <button class="btn-secondary" id="restartBtn2" data-i18n="restartBtn">重新起卦 · Restart</button>
</section>

</div> <!-- /.card -->

<!-- ========== Page footer (outside card) ========== -->
<footer class="footer">
  <a href="#" id="aboutLink" data-i18n="about">關於占卜</a>
  <a href="mailto:ccmm0403@gmail.com">ccmm0403@gmail.com</a>
  <a href="https://github.com/cchen744/YiMind" target="_blank" rel="noopener">GitHub</a>
</footer>
</div> <!-- /.wrap -->

<!-- ========== About modal ========== -->
<div class="modal-bg" id="aboutModal">
  <div class="modal" role="dialog" aria-modal="true">
    <button class="close" id="aboutClose" aria-label="close">×</button>
    <h3 data-i18n="about_title">大衍筮法 · The Yarrow Stalk Method</h3>
    <div id="aboutBody"></div>
  </div>
</div>

<script type="module">
// ============================================================================
//  YiMind app logic
//  ------------------------------------------------------------------------
//  State machine: intro → divining → result → interpretation
// ============================================================================
import { oneBian, oneYao, yaoMeta } from "./lib/dayan.js";
import { deriveHexagrams, hexagramSymbol } from "./lib/hexagram.js";

// ---- API endpoint: same-origin on Vercel. For local testing you can
// override with ?api=https://yimind.vercel.app
const params = new URLSearchParams(location.search);
const API_BASE = params.get("api") || "";

// ---- Load hexagram metadata (names, pinyin, translations)
let HEX_DB = null;
fetch("./data/hexagrams.json")
  .then(r => r.json())
  .then(j => { HEX_DB = Object.fromEntries(j.hexagrams.map(h => [h.kw, h])); })
  .catch(() => { HEX_DB = {}; }); // fall back gracefully

// ============================================================================
//  i18n
// ============================================================================
const I18N = {
  zh: {
    "title": "易 心",
    "subtitle": "大衍筮法 · 問卦於心",
    "intro.1": "《易》曰：「大衍之數五十，其用四十有九。」",
    "intro.2": "請先靜心，寫下您心中所欲問之事，再進入起卦。",
    "question.label": "所問之事",
    "question.placeholder": "例如：這學期該選哪一門課？",
    "startBtn": "開始起卦",
    "prog.yao": "第", "prog.yaoOf": "爻 / 六爻",
    "prog.bian": "第", "prog.bianOf": "變 / 三變",
    "stalks.hint": "請點擊下方蓍草堆，將其一分為二（點擊位置左側為左堆）",
    "interpretBtn": "請 AI 解卦",
    "restartBtn": "重新起卦",
    "interp.title": "卦象解讀",
    "role.ben":  "本卦", "role.bian": "變卦", "role.hu": "互卦",
    "no.changing": "六爻皆靜，只看本卦。",
    "has.changing": (lines) => `動爻在第 ${lines.map(i=>"初二三四五上"[i]).join("、")} 爻，本卦將變為變卦。`,
    "bian.line": (yaoIdx, bianIdx, leftN, rightN, leftRem, rightRem, removed, remaining) =>
      `第 ${"初二三四五上"[yaoIdx]} 爻 · 第 ${bianIdx} 變：分 ${leftN}/${rightN}，掛一，揲得 ${leftRem}+${rightRem}，共去 ${removed}，餘 ${remaining}`,
    "yao.done": (yaoIdx, value) =>
      `第 ${"初二三四五上"[yaoIdx]} 爻：${value}（${yaoMeta(value).name_zh}）`,
    "fill.question": "請先輸入所問之事。",
    "connecting": "正在請求解讀…",
    "apiError": "連接解讀服務失敗：",
    "about": "關於占卜",
    "about_title": "大衍筮法 · 六爻占卜",
    "about_body": `
<p>本站採用《周易·繫辭傳》所載「大衍之數五十，其用四十有九」之古法，透過三變成爻、六爻成卦的程序推演。</p>
<h4>一、分二掛一揲四歸奇</h4>
<p>取五十策，虛其一，餘四十九。以此為用：</p>
<ol>
  <li><b>分而為二</b>：隨手將蓍草分成兩堆（象兩儀）。</li>
  <li><b>掛一於小指</b>：自右堆取一策掛於左手小指（象三才）。</li>
  <li><b>揲之以四</b>：左右兩堆各以四策一組數之（象四時）。</li>
  <li><b>歸奇於扐</b>：將兩堆餘數（連同掛一）合併置於一旁。</li>
</ol>
<p>此為「一變」，其餘策必為 5 或 9。重複三次得「一爻」，三變後餘策除以四，得 6、7、8、9 四數之一。</p>
<h4>二、三卦之義</h4>
<ul>
  <li><b>本卦</b>：現下的處境、事之本體。</li>
  <li><b>變卦</b>：六、九為動爻，反轉後所成之卦，示事之發展、結果。</li>
  <li><b>互卦</b>：取本卦二三四爻為下卦、三四五爻為上卦，藏於卦中之機。</li>
</ul>
<h4>三、占前心法</h4>
<p>《易》曰：「不誠無物。」占前當靜心凝神，所問宜具體、誠正。一事一占，不可輕慢、不可再三。</p>
`,
  },

  en: {
    "title": "YiMind",
    "subtitle": "Yarrow Stalk IChing · Ask Your Question",
    "intro.1": '"Of the Great Expansion the number is 50; of these 49 are used."',
    "intro.2": "Settle your mind, write down what you wish to ask, then begin.",
    "question.label": "Your question",
    "question.placeholder": "e.g. Which class should I take this term?",
    "startBtn": "Begin divination",
    "prog.yao": "Line ", "prog.yaoOf": " of 6",
    "prog.bian": "變 ", "prog.bianOf": " of 3",
    "stalks.hint": "Click the stalk pile below to split it in two (stalks left of the click form the left pile)",
    "interpretBtn": "Ask AI to interpret",
    "restartBtn": "Restart",
    "interp.title": "Interpretation",
    "role.ben":  "Original", "role.bian": "Transformed", "role.hu": "Nuclear",
    "no.changing": "No changing lines — read only the Original hexagram.",
    "has.changing": (lines) => `Changing lines at positions ${lines.map(i=>i+1).join(", ")}. Original transforms into Transformed.`,
    "bian.line": (yaoIdx, bianIdx, leftN, rightN, leftRem, rightRem, removed, remaining) =>
      `Line ${yaoIdx+1} · 變 ${bianIdx}: split ${leftN}/${rightN}, hang 1, tally ${leftRem}+${rightRem}, remove ${removed}, remaining ${remaining}`,
    "yao.done": (yaoIdx, value) =>
      `Line ${yaoIdx+1}: ${value} (${yaoMeta(value).name_en})`,
    "fill.question": "Please enter your question first.",
    "connecting": "Contacting interpreter…",
    "apiError": "Interpretation service failed: ",
    "about": "About",
    "about_title": "The Yarrow Stalk Method · Da Yan Shi Fa",
    "about_body": `
<p>This site uses the classical method described in the <i>Xi Ci Zhuan</i> of the <i>I Ching</i>: "The number of the Great Expansion is fifty; of these, forty-nine are used." Each hexagram is built line by line through ritual manipulation of the stalks.</p>
<h4>1. Divide, Hang, Count, Remainder</h4>
<p>Start with 50 stalks, set one aside (unused), leaving 49. For each <i>change</i> (變):</p>
<ol>
  <li><b>Divide</b> the pile into two random heaps — Heaven and Earth.</li>
  <li><b>Hang one</b> stalk from the right heap between the little and ring fingers — Humanity.</li>
  <li><b>Count by fours</b> through each heap — the four seasons.</li>
  <li><b>Gather remainders</b> (1–4 from each side plus the hung stalk).</li>
</ol>
<p>One change removes either 5 or 9 stalks. Three changes produce one line, whose value (6, 7, 8, or 9) comes from dividing the final remaining stalks by four. Six lines require eighteen changes.</p>
<h4>2. Three Hexagrams</h4>
<ul>
  <li><b>Primary (本卦)</b> — the present situation, the root of the matter.</li>
  <li><b>Changing (變卦)</b> — the outcome, formed by flipping all moving lines (6 and 9).</li>
  <li><b>Nuclear (互卦)</b> — the hidden structure, built from lines 2–4 (lower) and 3–5 (upper) of the primary.</li>
</ul>
<h4>3. Before You Ask</h4>
<p>"Without sincerity, nothing is." Approach the oracle with a still mind and a precise question. Ask once, and accept what is given.</p>
`,
  }
};
let lang = "zh";
function t(key, ...args) {
  const v = I18N[lang][key];
  return typeof v === "function" ? v(...args) : v;
}
function applyI18n() {
  document.documentElement.lang = lang === "zh" ? "zh-Hant" : "en";
  document.querySelectorAll("[data-i18n]").forEach(el => {
    const k = el.getAttribute("data-i18n");
    if (I18N[lang][k]) el.textContent = I18N[lang][k];
  });
  document.querySelectorAll("[data-i18n-placeholder]").forEach(el => {
    const k = el.getAttribute("data-i18n-placeholder");
    if (I18N[lang][k]) el.placeholder = I18N[lang][k];
  });
  document.getElementById("langBtn").textContent = lang === "zh" ? "English" : "中文";
  // if modal is open, re-render its body in the new language
  if (aboutModal.classList.contains("open")) {
    aboutBody.innerHTML = t("about_body");
  }
}

// ============================================================================
//  Screen router
// ============================================================================
function showScreen(id) {
  document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
  window.scrollTo({ top: 0, behavior: "smooth" });
  if (id === "screen-divining") {
    requestAnimationFrame(() => { sizeCanvas(); drawStalks(); });
  }
}

// ============================================================================
//  Divination state
// ============================================================================
const state = {
  question: "",
  N: 49,                  // current stalks in hand
  currentYao: 0,          // 0..5, bottom→top
  currentBian: 0,         // 0..2
  currentSplits: [],      // splits within the current 爻
  yaoValues: [],          // completed 爻 (6 values)
  log: [],                // textual log of each 變 step
};

function resetState() {
  Object.assign(state, {
    question: "", N: 49, currentYao: 0, currentBian: 0,
    currentSplits: [], yaoValues: [], log: [],
  });
}

// ============================================================================
//  Canvas stalk pile
// ============================================================================
const canvas = document.getElementById("stalks");
const ctx = canvas.getContext("2d");

function sizeCanvas() {
  const rect = canvas.getBoundingClientRect();
  const dpr = window.devicePixelRatio || 1;
  canvas.width = rect.width * dpr;
  canvas.height = rect.height * dpr;
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
window.addEventListener("resize", () => { sizeCanvas(); drawStalks(); });

function drawStalks() {
  const rect = canvas.getBoundingClientRect();
  const W = rect.width, H = rect.height;
  ctx.clearRect(0, 0, W, H);
  const N = state.N;
  if (N <= 0) return;
  const margin = 24;
  const avail = W - 2 * margin;
  const spacing = avail / N;
  for (let i = 0; i < N; i++) {
    // alternate a tiny y offset + a tilt per stalk so it looks organic
    const seed = (i * 13 + 7) % 17;
    const x = margin + (i + 0.5) * spacing;
    const topY = 20 + (seed % 5);
    const botY = H - 20 - ((seed * 3) % 6);
    const dx = ((seed % 7) - 3) * 0.4;  // small tilt
    ctx.strokeStyle = "#6b3e1a";
    ctx.lineWidth = Math.max(1.2, spacing * 0.25);
    ctx.lineCap = "round";
    ctx.beginPath();
    ctx.moveTo(x - dx, topY);
    ctx.lineTo(x + dx, botY);
    ctx.stroke();
  }
}

// user clicks pile → determine leftN from x position
canvas.addEventListener("click", (ev) => {
  const rect = canvas.getBoundingClientRect();
  const x = ev.clientX - rect.left;
  const margin = 24;
  const avail = rect.width - 2 * margin;
  const frac = Math.max(0, Math.min(1, (x - margin) / avail));
  // left pile gets round(frac * N); clamp to [1, N-1]
  let leftN = Math.round(frac * state.N);
  leftN = Math.max(1, Math.min(state.N - 1, leftN));
  doBian(leftN);
});

// ============================================================================
//  Divination flow — 18 變 → 6 爻 → build hexagrams
// ============================================================================
function doBian(leftN) {
  const step = oneBian(state.N, leftN);
  state.currentSplits.push(leftN);
  state.log.push({
    kind: "bian",
    yaoIdx: state.currentYao,
    bianIdx: state.currentBian + 1,
    ...step,
  });
  state.N = step.remaining;
  state.currentBian++;

  if (state.currentBian === 3) {
    // finished this 爻
    const { value } = oneYao(state.currentSplits);
    state.yaoValues.push(value);
    state.log.push({ kind: "yao", yaoIdx: state.currentYao, value });
    state.currentSplits = [];
    state.currentBian = 0;
    state.currentYao++;
    state.N = 49; // reset for next 爻
  }

  if (state.currentYao === 6) {
    renderYaoStack(); drawStalks();
    setTimeout(() => showResult(), 400);
    return;
  }
  render();
}

function render() {
  // progress
  document.getElementById("progYao").textContent  = Math.min(state.currentYao + 1, 6);
  document.getElementById("progBian").textContent = state.currentBian + 1;
  renderYaoStack();
  renderLog();
  drawStalks();
}

function renderYaoStack() {
  const host = document.getElementById("yaoStack");
  host.innerHTML = "";
  for (let i = 0; i < 6; i++) {
    const row = document.createElement("div");
    row.className = "yao-row";
    const label = document.createElement("div");
    label.className = "yao-label";
    label.textContent = "初二三四五上"[i];
    const line = document.createElement("div");
    line.className = "yao-line";
    const val = state.yaoValues[i];
    if (val === undefined) {
      line.style.background = "rgba(0,0,0,0.06)";
    } else {
      const meta = yaoMeta(val);
      if (meta.solid) line.classList.add("solid");
      else line.classList.add("broken");
      if (meta.changing) line.classList.add("changing");
    }
    row.append(label, line);
    host.append(row);
  }
}

function renderLog() {
  const host = document.getElementById("bianLog");
  const parts = state.log.map((e, idx) => {
    const isLast = idx === state.log.length - 1;
    const cls = isLast ? "fresh" : "completed";
    if (e.kind === "bian") {
      return `<div class="${cls}">${t("bian.line",
        e.yaoIdx, e.bianIdx, e.leftN, e.rightN, e.leftRem, e.rightRem, e.removed, e.remaining)}</div>`;
    } else {
      return `<div class="${cls}"><strong>${t("yao.done", e.yaoIdx, e.value)}</strong></div>`;
    }
  });
  host.innerHTML = parts.join("");
  host.scrollTop = host.scrollHeight;
}

// ============================================================================
//  Result screen
// ============================================================================
let lastResult = null;

function showResult() {
  lastResult = deriveHexagrams(state.yaoValues);
  renderHexCards("hexGrid", lastResult);
  const note = lastResult.hasChanging
    ? t("has.changing", lastResult.changingLines)
    : t("no.changing");
  document.getElementById("changingNote").innerHTML =
    `<div class="changing-note">${note}</div>`;
  showScreen("screen-result");
}

function renderHexCards(containerId, result) {
  const host = document.getElementById(containerId);
  host.innerHTML = "";
  const items = [
    ["ben", result.ben],
    ["bian", result.bian],
    ["hu",  result.hu],
  ];
  for (const [role, h] of items) {
    const meta = HEX_DB && HEX_DB[h.kw];
    const card = document.createElement("div");
    card.className = "hex-card";
    const zhName = meta?.zh_name ?? `KW ${h.kw}`;
    const enName = meta?.en_name ?? "";
    const pinyin = meta?.pinyin ?? "";
    card.innerHTML = `
      <div class="hex-role">${t(`role.${role}`)}</div>
      <div class="hex-symbol">${hexagramSymbol(h.kw)}</div>
      <div class="hex-name">${zhName} · ${pinyin}</div>
      <div class="hex-name-en">${enName}</div>
      <div class="hex-kw">King Wen #${h.kw}</div>
    `;
    // hide 變卦 if no changing lines (it would just equal 本卦)
    if (role === "bian" && !result.hasChanging) card.classList.add("hidden");
    host.append(card);
  }
}

// ============================================================================
//  AI streaming interpretation
// ============================================================================
async function interpret() {
  if (!lastResult) return;
  renderHexCards("hexGridRecap", lastResult);
  document.getElementById("interpBody").innerHTML = `<span class="cursor"></span>`;
  document.getElementById("interpError").innerHTML = "";
  showScreen("screen-interp");

  const payload = buildPayload(state.question, lastResult);
  try {
    const res = await fetch(`${API_BASE}/api/divine`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ ...payload, lang }),
    });
    if (!res.ok || !res.body) {
      const txt = await res.text().catch(() => "");
      throw new Error(`HTTP ${res.status} ${txt.slice(0, 200)}`);
    }
    const reader = res.body.getReader();
    const dec = new TextDecoder();
    const body = document.getElementById("interpBody");
    let buf = "";
    let acc = "";
    while (true) {
      const { value, done } = await reader.read();
      if (done) break;
      buf += dec.decode(value, { stream: true });
      // SSE parse: events separated by double newline
      let idx;
      while ((idx = buf.indexOf("\n\n")) !== -1) {
        const chunk = buf.slice(0, idx); buf = buf.slice(idx + 2);
        for (const line of chunk.split("\n")) {
          if (!line.startsWith("data:")) continue;
          const data = line.slice(5).trim();
          if (data === "[DONE]") continue;
          try {
            const j = JSON.parse(data);
            const delta = j.choices?.[0]?.delta?.content ?? "";
            if (delta) { acc += delta; body.textContent = acc; body.innerHTML += '<span class="cursor"></span>'; }
          } catch { /* ignore partial */ }
        }
      }
    }
    // strip trailing cursor
    body.innerHTML = body.innerHTML.replace(/<span class="cursor"><\/span>$/, "");
  } catch (err) {
    document.getElementById("interpError").innerHTML =
      `<div class="error">${t("apiError")} ${err.message}</div>`;
  }
}

function buildPayload(question, result) {
  const n = (kw) => HEX_DB?.[kw] ?? { zh_name: `KW${kw}`, en_name: "", pinyin: "" };
  const ben = n(result.ben.kw), bian = n(result.bian.kw), hu = n(result.hu.kw);
  return {
    question,
    ben:  { kw: result.ben.kw,  zh_name: ben.zh_name,  en_name: ben.en_name,  pinyin: ben.pinyin,  lines: result.ben.lines  },
    bian: { kw: result.bian.kw, zh_name: bian.zh_name, en_name: bian.en_name, pinyin: bian.pinyin, lines: result.bian.lines },
    hu:   { kw: result.hu.kw,   zh_name: hu.zh_name,   en_name: hu.en_name,   pinyin: hu.pinyin,   lines: result.hu.lines   },
    yaoValues: result.yaoValues,
    changingLines: result.changingLines,
    hasChanging: result.hasChanging,
  };
}

});

document.getElementById("startBtn").onclick = () => {
  const q = document.getElementById("question").value.trim();
  if (!q) { alert(t("fill.question")); return; }
  resetState();
  state.question = q;
  render();
  sizeCanvas();
  showScreen("screen-divining");
};
document.getElementById("interpretBtn").onclick = interpret;
document.getElementById("restartBtn").onclick  = () => { resetState(); showScreen("screen-intro"); };
document.getElementById("restartBtn2").onclick = () => { resetState(); showScreen("screen-intro"); };

// initial canvas paint (pile isn't visible until divining starts, but size it)
sizeCanvas();
